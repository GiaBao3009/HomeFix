# Server Configuration
server.port=8080
server.forward-headers-strategy=framework

# Database Configuration (MySQL / Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/homefix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=HomeFixSecretKeyForJwtTokenGeneration2024HomeFixSecretKeyForJwtTokenGeneration2024
jwt.expiration=86400000

# File Upload Configuration (if needed later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration - env var HOMEFIX_APP_CORS_ALLOWED_ORIGINS overrides in production
homefix.app.cors.allowed-origins=${HOMEFIX_APP_CORS_ALLOWED_ORIGINS:https://homefix.ink,https://www.homefix.ink,http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.16.*:*}

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=baoldz3009@gmail.com
spring.mail.password=mcqu mkza wekp grin
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (for reset password link) - env var APP_FRONTEND_URL overrides in production
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# GitHub OAuth2 Configuration
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:tam_thoi_chua_cau_hinh}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:tam_thoi_chua_cau_hinh}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# App OAuth2 Redirect - env var APP_OAUTH2_REDIRECT_URI overrides in production
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}
