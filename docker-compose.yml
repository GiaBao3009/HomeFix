services:
  db:
    image: mysql:8.0
    container_name: homefix-mysql
    restart: always
    environment:
      MYSQL_DATABASE: homefix_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - homefix-net

  backend:
    build: ./backend
    container_name: homefix-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/homefix_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - GOOGLE_CLIENT_ID=tam_thoi_chua_dung
      - GOOGLE_CLIENT_SECRET=tam_thoi_chua_dung
      - HOMEFIX_APP_CORS_ALLOWED_ORIGINS=http://homefix.ink,https://homefix.ink,http://localhost:5173,http://localhost:5174
      - APP_FRONTEND_URL=https://homefix.ink
      - APP_OAUTH2_REDIRECT_URI=https://homefix.ink/oauth2/redirect
    depends_on:
      db:
        condition: service_healthy
    networks:
      - homefix-net

  frontend:
    build: ./frontend
    container_name: homefix-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - homefix-net

volumes:
  db_data:

networks:
  homefix-net:
    driver: bridge
