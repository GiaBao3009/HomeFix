services:
  db:
    image: mysql:8.0
    container_name: homefix-mysql
    restart: always
    environment:
      MYSQL_DATABASE: homefix_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: homefix-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/homefix_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - GOOGLE_CLIENT_ID=tam_thoi_chua_dung
      - GOOGLE_CLIENT_SECRET=tam_thoi_chua_dung
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: homefix-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
