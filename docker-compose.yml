services:
  db:
    image: mysql:8.0
    container_name: homefix-mysql
    restart: always
    environment:
      MYSQL_DATABASE: homefix_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - homefix-net

  backend:
    build: ./backend
    container_name: homefix-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/homefix_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=30000
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false
      - GOOGLE_CLIENT_ID=tam_thoi_chua_dung
      - GOOGLE_CLIENT_SECRET=tam_thoi_chua_dung
      - HOMEFIX_APP_CORS_ALLOWED_ORIGINS=https://homefix.ink,https://www.homefix.ink,http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.16.*:*
      - APP_FRONTEND_URL=https://homefix.ink
      - APP_OAUTH2_REDIRECT_URI=https://homefix.ink/oauth2/redirect
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/v3/api-docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    networks:
      - homefix-net

  frontend:
    build: ./frontend
    container_name: homefix-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - homefix-net

volumes:
  db_data:
  ssl_certs:
  certbot_www:

networks:
  homefix-net:
    driver: bridge
